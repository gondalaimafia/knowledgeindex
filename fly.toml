app = "knowledge-index"
primary_region = "sjc"

[build]

[env]
  PORT = "8080"
  MIX_ENV = "prod"
  ECTO_IPV6 = "false"
  DNS_CLUSTER_QUERY = ""

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1
